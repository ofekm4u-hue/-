<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שו"ב | מאבטח ש"ג</title>
<link rel="stylesheet" href="shared/tokens.css">
<style>
  .gate-wrap {
    padding: 12px;
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    gap: 12px;
    min-height: calc(100vh - var(--header-h));
  }
  @media (max-width: 820px) {
    .gate-wrap { grid-template-columns: 1fr; }
    .gate-tabs { display: flex !important; overflow-x: auto; }
    .gate-tab { flex: none; }
  }

  .gate-tabs {
    display: grid;
    gap: 8px;
    align-content: start;
  }
  .gate-tab {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px;
    cursor: pointer;
    transition: all var(--t-fast);
    text-align: right;
    font-family: var(--font-ui);
  }
  .gate-tab:hover { border-color: var(--accent); }
  .gate-tab.is-active {
    background: var(--bg-elev-2);
    border-color: var(--accent);
    box-shadow: inset 4px 0 0 var(--accent);
  }
  .gate-tab .tab-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .gate-tab .tab-meta { font-size: 11px; color: var(--text-mid); }
  .gate-tab .tab-count {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 8px;
    background: var(--bg-deep);
    border-radius: var(--r-pill);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
  }

  .gate-content {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 16px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .gate-toolbar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .vehicle-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 12px 14px;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .vehicle-card + .vehicle-card { margin-top: 8px; }
  .vehicle-plate {
    background: var(--bg-deep);
    color: var(--accent);
    font-family: var(--font-mono);
    font-weight: 700;
    padding: 8px 12px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    font-size: 16px;
    letter-spacing: .05em;
    min-width: 130px;
    text-align: center;
  }
  .vehicle-card .info { flex: 1; }
  .vehicle-card .driver { font-weight: 700; }
  .vehicle-card .vendor { color: var(--text-mid); font-size: 12px; }

  .scan-banner {
    background: var(--bg-elev);
    border: 1px dashed var(--border-hi);
    border-radius: var(--r-md);
    padding: 18px;
    text-align: center;
    margin-bottom: 14px;
  }
  .scan-banner h3 { margin-bottom: 6px; }
  .scan-banner.is-blacklist {
    background: rgba(255,71,87,0.10);
    border-color: var(--danger);
    color: var(--danger);
    animation: blink-danger 0.8s infinite;
  }

  .bus-row {
    display: grid;
    grid-template-columns: 100px 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg-elev);
    border-radius: var(--r-sm);
    margin-bottom: 6px;
  }
  .bus-status {
    padding: 4px 10px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-ui);
    color: white;
  }
  .bus-status.planned { background: var(--bus-planned); }
  .bus-status.waiting { background: var(--bus-waiting); color: #1a0e00; }
  .bus-status.cleared { background: var(--bus-cleared); color: #052817; }
  .bus-status.inside  { background: var(--bus-inside); }
  .bus-status.left    { background: var(--bus-left); }
</style>
</head>
<body class="tactical-grid">
  <div id="header"></div>

  <div class="gate-wrap">
    <nav class="gate-tabs">
      <button class="gate-tab is-active" data-tab="suppliers">
        <div class="tab-title">🚚 ספקים</div>
        <div class="tab-meta">רכבי אספקה מאושרים</div>
        <span class="tab-count" data-count="suppliers">—</span>
      </button>
      <button class="gate-tab" data-tab="buses">
        <div class="tab-title">🚌 אוטובוסים</div>
        <div class="tab-meta">מסונכרן עם חמ"ל</div>
        <span class="tab-count" data-count="buses">—</span>
      </button>
      <button class="gate-tab" data-tab="staff">
        <div class="tab-title">👥 צוות מחנה</div>
        <div class="tab-meta">צוות והנהגה רשמית</div>
        <span class="tab-count" data-count="staff">—</span>
      </button>
      <button class="gate-tab" data-tab="guests">
        <div class="tab-title">🎫 אורחים מאושרים</div>
        <div class="tab-meta">מבקרים בתיאום קב"ט</div>
        <span class="tab-count" data-count="guests">—</span>
      </button>
      <button class="gate-tab" data-tab="exceptions">
        <div class="tab-title">⚠ אישורים חריגים</div>
        <div class="tab-meta">ממתינים לקב"ט</div>
        <span class="tab-count" data-count="exceptions">—</span>
      </button>
      <div style="margin-top: 12px; padding: 12px; background: var(--bg-elev); border-radius: var(--r-md); border: 1px dashed var(--border);">
        <div style="font-family: var(--font-ui); font-weight: 700; font-size: 13px; margin-bottom: 8px;">📷 סורק תעודות</div>
        <button class="btn btn--primary btn--block" id="btn-scan">סרוק תעודת זהות</button>
        <button class="btn btn--block" id="btn-request-exception" style="margin-top: 6px;">בקש אישור חריג</button>
      </div>
    </nav>

    <main class="gate-content">
      <!-- Scan banner -->
      <div class="scan-banner" id="scan-banner" hidden></div>

      <!-- Tab panes -->
      <section data-pane="suppliers"></section>
      <section data-pane="buses" hidden></section>
      <section data-pane="staff" hidden></section>
      <section data-pane="guests" hidden></section>
      <section data-pane="exceptions" hidden></section>
    </main>
  </div>

<script src="shared/engine.js"></script>
<script>
(function () {
  'use strict';
  const { ScoutDB, Bus, UI, SOS, Toast, util, DMS, Auth } = Scout;

  if (!Auth.requireLogin()) return;

  // ===== Mission picker (unified security role) =====
  const persona = UI.currentPersona();
  let currentMission = UI.isSecurityRole(persona.role) ? UI.getMission(persona.staffId) : null;

  function showMissionPicker(opts) {
    opts = opts || {};
    return new Promise(resolve => {
      const host = document.createElement('div');
      host.className = 'modal-host';
      host.innerHTML = `
        <div class="modal" style="width: min(520px, 92vw); text-align: center;">
          <div style="color: var(--accent); font-family: var(--font-ui); font-weight: 800; letter-spacing: .14em; text-transform: uppercase; font-size: 12px; margin-bottom: 4px;">${opts.title || 'בחר משימה למשמרת זו'}</div>
          <h2 style="margin: 4px 0 6px;">מערך אבטחה אחוד</h2>
          <p style="color: var(--text-mid); margin: 0 0 22px; font-size: 13px;">המאבטח הוא יישות אחת. בחר במשימה הנוכחית — ניתן להחליף במהלך המשמרת.</p>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn btn--lg" data-mission="gate" style="height: 110px; display: flex; flex-direction: column; gap: 6px;">
              <span style="font-size: 32px;">⛩</span>
              <span style="font-family: var(--font-ui); font-weight: 700; font-size: 16px;">ש"ג (שער)</span>
              <span style="font-size: 11px; color: var(--text-mid); font-weight: 400;">טבלאות רכבים, סורק תעודות, אישורים</span>
            </button>
            <button class="btn btn--lg" data-mission="patrol" style="height: 110px; display: flex; flex-direction: column; gap: 6px;">
              <span style="font-size: 32px;">🚶</span>
              <span style="font-family: var(--font-ui); font-weight: 700; font-size: 16px;">סיור (שטח)</span>
              <span style="font-size: 11px; color: var(--text-mid); font-weight: 400;">נקודות ציון, צ׳ק-ליסט סבב, דיווח מפגעים</span>
            </button>
          </div>
          ${opts.allowCancel ? '<div style="margin-top: 14px;"><button class="btn btn--ghost btn--sm" data-cancel>ביטול</button></div>' : ''}
        </div>
      `;
      document.body.appendChild(host);
      host.addEventListener('click', e => {
        if (e.target.dataset.cancel) { host.remove(); resolve(null); return; }
        const btn = e.target.closest('[data-mission]');
        if (!btn) return;
        const m = btn.dataset.mission;
        if (persona.staffId) UI.setMission(persona.staffId, m);
        currentMission = m;
        host.remove();
        resolve(m);
      });
    });
  }

  function applyMissionLayout() {
    // Layout differences:
    // - Gate mission: suppliers/buses/staff/guests/exceptions tabs visible
    // - Patrol mission: only patrol-relevant content
    const gateTabIds = ['suppliers', 'buses', 'staff', 'guests', 'exceptions'];
    if (currentMission === 'patrol') {
      // Hide tabs and show patrol view
      document.querySelector('.gate-tabs').style.display = 'none';
      document.querySelector('.gate-content').innerHTML = renderPatrolView();
      bindPatrolView();
    } else {
      document.querySelector('.gate-tabs').style.display = '';
      // Restore the gate panes (they're static in HTML; if patrol was rendered we'd need to restore)
      // For initial load, the panes are already there.
    }
  }

  // Determine if persona needs mission picker
  const needsPicker = UI.isSecurityRole(persona.role) && !currentMission;

  document.getElementById('header').innerHTML = UI.header({
    title: currentMission === 'patrol' ? 'מאבטח — משמרת סיור' : 'מאבטח — משמרת ש"ג',
    subtitle: persona.staffId && currentMission ? (currentMission === 'gate' ? '⛩ ש"ג' : '🚶 סיור') : null,
  });
  UI.bindHeader(document.body);
  UI.mockBadge('דמו פרזנטציה');

  // Add mission-switch button to header for security personas
  if (UI.isSecurityRole(persona.role)) {
    const switchBtn = document.createElement('button');
    switchBtn.className = 'btn btn--sm';
    switchBtn.style.cssText = 'margin: 0 6px;';
    switchBtn.textContent = '🔄 החלף משימה';
    switchBtn.title = 'החלף בין ש"ג לסיור באמצע המשמרת';
    switchBtn.addEventListener('click', async () => {
      const m = await showMissionPicker({ title: 'החלפת משימה', allowCancel: true });
      if (m) {
        Toast.show(`המשימה הוחלפה ל-${m === 'gate' ? 'ש"ג' : 'סיור'}`, { kind: 'ok' });
        setTimeout(() => location.reload(), 500);
      }
    });
    const headerEl = document.querySelector('.header');
    const logoutBtn = headerEl.querySelector('[data-logout]');
    if (logoutBtn) headerEl.insertBefore(switchBtn, logoutBtn);
    else headerEl.appendChild(switchBtn);
  }

  if (needsPicker) {
    showMissionPicker().then(() => location.reload());
    return;
  }

  // Allow URL flag to demo DMS quickly
  if (util.getParam('dms') === 'on') {
    DMS.start({ force: true });
    Toast.show('Dead-Man Switch מופעל במצב דמו (פופ-אפ בעוד 4 שניות)', { kind: 'warn' });
  }

  // Tabs
  const tabs = document.querySelectorAll('.gate-tab[data-tab]');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('is-active'));
    t.classList.add('is-active');
    document.querySelectorAll('[data-pane]').forEach(p => p.hidden = p.dataset.pane !== t.dataset.tab);
  }));

  // Helpers
  const banner = document.getElementById('scan-banner');
  function showBanner(html, kind) {
    banner.hidden = false;
    banner.className = 'scan-banner' + (kind === 'danger' ? ' is-blacklist' : '');
    banner.innerHTML = html;
    setTimeout(() => banner.hidden = true, 5500);
  }

  // ----- Suppliers -----
  function renderSuppliers() {
    const list = ScoutDB.get('vehicles', []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">רכבי ספקים מאושרים</h2>
        <span class="chip">${list.length} רכבים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--ok">פילטר ירוק אוטומטי בשער</span>
      </div>
      ${list.map(v => `
        <div class="vehicle-card">
          <div class="vehicle-plate">${util.escapeHtml(v.plate)}</div>
          <div class="info">
            <div class="driver">${util.escapeHtml(v.driver)}</div>
            <div class="vendor">${util.escapeHtml(v.vendor)}${v.addedByKabat ? ' <span class="chip" style="background: rgba(91,141,239,0.18); color: var(--info); border-color: transparent;">הוסף ע״י קב״ט</span>' : ''}</div>
          </div>
          ${v.arrived
            ? '<span class="chip chip--info">בתוך המחנה</span>'
            : `<button class="btn btn--ok" data-mark-in="${v.id}">אשר כניסה</button>`}
        </div>
      `).join('')}
    `;
    document.querySelector('[data-pane="suppliers"]').innerHTML = html;
    document.querySelector('[data-count="suppliers"]').textContent = list.length;
  }
  document.addEventListener('click', e => {
    const id = e.target.dataset.markIn;
    if (!id) return;
    ScoutDB.patch('vehicles', list => list.map(x => x.id === id ? Object.assign({}, x, { arrived: true }) : x));
    ScoutDB.appendAudit({ action: 'VEH-IN', channel: 'gate', details: 'רכב ' + id });
    Toast.show('הרכב סומן כנכנס למחנה.', { kind: 'ok' });
    renderSuppliers();
  });

  // ----- Buses -----
  const BUS_STATUS_LABEL = { planned: 'מתוכנן', waiting: 'בחניון המתנה', cleared: 'מאושר לכניסה', inside: 'בתוך המחנה', left: 'עזב' };
  function renderBuses() {
    const buses = ScoutDB.get('buses', []);
    const tribes = ScoutDB.get('tribes', []);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">לוח אוטובוסים — מסונכרן חי</h2>
        <span class="chip">${buses.length} אוטובוסים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--demo">קלט נוצר בחמ"ל</span>
      </div>
      ${buses.map(b => {
        const t = tribes.find(tr => tr.id === b.tribeId);
        const tName = t ? t.name : (b.tribeName || '—');
        const canEnter = b.status === 'cleared';
        return `
          <div class="bus-row">
            <span class="vehicle-plate" style="font-size: 13px; min-width: auto;">${util.escapeHtml(b.plate)}</span>
            <div>
              <div style="font-weight: 700;">שבט ${util.escapeHtml(tName)} · ${util.escapeHtml(b.battalion || '')}${b.addedByKabat ? ' <span class="chip" style="background: rgba(91,141,239,0.18); color: var(--info); border-color: transparent;">קב״ט</span>' : ''}</div>
              <div style="color: var(--text-mid); font-size: 11px;">${b.driver ? 'נהג: ' + util.escapeHtml(b.driver) + ' · ' : ''}${b.escort ? 'מלווה: ' + util.escapeHtml(b.escort) + ' · ' : ''}${b.hanichim || 0} חניכים</div>
            </div>
            <span class="bus-status ${b.status}">${BUS_STATUS_LABEL[b.status]}</span>
            ${canEnter ? `<button class="btn btn--ok btn--sm" data-bus-in="${b.id}">הכנס למחנה</button>` :
              b.status === 'inside' ? `<button class="btn btn--sm" data-bus-out="${b.id}">סמן יציאה</button>` :
              `<span class="chip">המתנה</span>`}
          </div>
        `;
      }).join('')}
    `;
    document.querySelector('[data-pane="buses"]').innerHTML = html;
    document.querySelector('[data-count="buses"]').textContent = buses.length;
  }
  document.addEventListener('click', e => {
    const idIn = e.target.dataset.busIn, idOut = e.target.dataset.busOut;
    if (idIn) {
      ScoutDB.patch('buses', l => l.map(x => x.id === idIn ? Object.assign({}, x, { status: 'inside' }) : x));
      ScoutDB.appendAudit({ action: 'BUS-IN', channel: 'gate', details: 'אוטובוס ' + idIn });
      renderBuses();
    }
    if (idOut) {
      ScoutDB.patch('buses', l => l.map(x => x.id === idOut ? Object.assign({}, x, { status: 'left' }) : x));
      ScoutDB.appendAudit({ action: 'BUS-OUT', channel: 'gate', details: 'אוטובוס ' + idOut });
      renderBuses();
    }
  });

  // ----- Camp Staff (team + leadership only) -----
  function renderStaff() {
    const all = ScoutDB.get('staff', []) || [];
    const team = all.filter(s => !s.guestPass && s.role !== 'guest');
    const pendingCount = team.filter(s => s.pendingOnboarding).length;
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">צוות מחנה והנהגה</h2>
        <span class="chip">${team.length} אנשי צוות</span>
        ${pendingCount > 0 ? `<span class="chip" style="background: rgba(154,168,188,0.12); color: var(--text-mid); border-color: transparent;">${pendingCount} ממתינים להפעלה</span>` : ''}
        <span style="flex:1;"></span>
        <span class="chip chip--demo">הנפקה דרך מסך הקב"ט</span>
      </div>
      ${team.length === 0 ? '<div style="text-align:center; padding: 22px; color: var(--text-low);">אין אנשי צוות.</div>' :
        team.map(s => {
          const isPending = s.pendingOnboarding;
          const initial = (s.name.split(' ').slice(-1)[0] || s.name)[0] || '?';
          return `
            <div class="vehicle-card" ${isPending ? 'style="border-style: dashed; border-color: var(--text-low);"' : ''}>
              <div style="width: 40px; height: 40px; background: ${isPending ? 'var(--bg-deep)' : 'var(--ok)'}; color: ${isPending ? 'var(--text-mid)' : '#052817'}; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; border: 1px solid var(--border);">${util.escapeHtml(initial)}</div>
              <div class="info">
                <div class="driver">${util.escapeHtml(s.name)}${isPending ? ` <span style="font-family: var(--font-mono); font-size: 11px; color: var(--text-low);">(${util.escapeHtml(s.tempUsername || '')})</span>` : ''}</div>
                <div class="vendor">${util.escapeHtml(UI.ROLE_LABELS[s.role] || s.role)}${s.phone ? ' · ' + util.escapeHtml(s.phone) : ''}</div>
              </div>
              ${isPending
                ? '<span class="chip" style="background: rgba(154,168,188,0.12); color: var(--text-mid); border-color: transparent; font-weight: 700; font-size: 12px;">⏳ ממתין להפעלה</span>'
                : '<span class="chip chip--ok" style="font-weight: 700;">✅ פעיל במחנה</span>'}
            </div>`;
        }).join('')}
    `;
    document.querySelector('[data-pane="staff"]').innerHTML = html;
    document.querySelector('[data-count="staff"]').textContent = team.length;
  }

  // ----- Approved Entry Guests -----
  function renderGuests() {
    const all = ScoutDB.get('staff', []) || [];
    const guests = all.filter(s => s.guestPass || s.role === 'guest');
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">אורחים מאושרים כניסה</h2>
        <span class="chip">${guests.length} אורחים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--demo">הוספה דרך מסך הקב"ט</span>
      </div>
      ${guests.length === 0 ? '<div style="text-align:center; padding: 22px; color: var(--text-low);">אין אורחים מאושרים כרגע.</div>' :
        guests.map(g => {
          const initial = (g.name.split(' ').slice(-1)[0] || g.name)[0] || '?';
          return `
            <div class="vehicle-card" style="border-color: var(--info); box-shadow: inset 4px 0 0 var(--info);">
              <div style="width: 40px; height: 40px; background: var(--info); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px;">${util.escapeHtml(initial)}</div>
              <div class="info">
                <div class="driver">${util.escapeHtml(g.name)}${g.plate ? ' · <span style="font-family: var(--font-mono); color: var(--text-mid);">' + util.escapeHtml(g.plate) + '</span>' : ''}</div>
                <div class="vendor">${util.escapeHtml(g.affiliation || 'אורח')}${g.phone ? ' · ' + util.escapeHtml(g.phone) : ''}</div>
              </div>
              ${g.checkedInAt
                ? `<span class="chip chip--info" style="font-weight: 700;">בתוך המחנה · ${util.fmtTime(g.checkedInAt)}</span>`
                : `<button class="btn btn--ok btn--sm" data-guest-checkin="${g.id}">סמן נכנס</button>`}
            </div>`;
        }).join('')}
    `;
    document.querySelector('[data-pane="guests"]').innerHTML = html;
    document.querySelector('[data-count="guests"]').textContent = guests.length;
  }

  document.addEventListener('click', e => {
    const id = e.target.dataset.guestCheckin;
    if (!id) return;
    ScoutDB.patch('staff', l => l.map(s => s.id === id ? Object.assign({}, s, { checkedInAt: util.nowMs() }) : s));
    ScoutDB.appendAudit({ action: 'GUEST-CHECKIN', channel: 'gate', details: 'אורח נכנס: ' + id });
    Toast.show('הכניסה נרשמה.', { kind: 'ok' });
    renderGuests();
  });

  // ----- Exceptions -----
  function renderExceptions() {
    const all = ScoutDB.get('gateExceptions', []) || [];
    const pending = all.filter(x => !x.resolved);
    const html = `
      <div class="gate-toolbar">
        <h2 style="font-family: var(--font-ui);">בקשות אישור חריג</h2>
        <span class="chip chip--warn">${pending.length} ממתינים</span>
        <span style="flex:1;"></span>
        <span class="chip chip--demo">פיד חי מקב"ט</span>
      </div>
      ${all.length === 0 ? '<div style="color: var(--text-low); padding: 12px;">אין בקשות.</div>' :
      all.slice().reverse().map(x => `
        <div class="vehicle-card">
          <div class="vehicle-plate">${util.escapeHtml(x.plate || x.idNum || '?')}</div>
          <div class="info">
            <div class="driver">${util.escapeHtml(x.who || 'בקשה לאישור')}</div>
            <div class="vendor">${util.escapeHtml(x.reason || '—')} · ${util.fmtTime(x.ts)}</div>
          </div>
          ${x.resolved
            ? `<span class="chip chip--${x.decision === 'approved' ? 'ok' : 'danger'}">${x.decision === 'approved' ? 'אושר' : 'נדחה'}</span>`
            : `<span class="chip chip--warn">ממתין</span>`}
        </div>
      `).join('')}
    `;
    document.querySelector('[data-pane="exceptions"]').innerHTML = html;
    document.querySelector('[data-count="exceptions"]').textContent = pending.length;
  }

  // ----- Scan ID (mock) -----
  const FAKE_IDS = ['034567891', '321456789', '589632147', '111222333', '654321987'];
  document.getElementById('btn-scan').addEventListener('click', () => {
    const id = util.pick(FAKE_IDS);
    const blacklist = ScoutDB.get('blacklist', []);
    const hit = blacklist.find(b => b.value === id);
    Scout.Audio.play('blip');
    if (hit) {
      showBanner(`
        <h3>⛔ חסום ע"י קב"ט</h3>
        <p>ת.ז. <strong>${id}</strong></p>
        <p style="font-size: 12px;">סיבה: ${util.escapeHtml(hit.reason)}</p>
        <p style="font-size: 12px; margin-top: 6px;">לא ניתן להכניס ללא אישור-על של הקב"ט.</p>
      `, 'danger');
      Scout.Audio.play('pulse-alert');
      ScoutDB.appendAudit({ action: 'BLACKLIST-HIT', channel: 'gate', details: 'ת.ז. ' + id });
    } else {
      showBanner(`<h3>✅ ת.ז. ${id}</h3><p>תקף לכניסה — הוכנס לרשימת הסגל</p>`, 'ok');
      ScoutDB.appendAudit({ action: 'ID-SCAN', channel: 'gate', details: 'ת.ז. ' + id });
    }
  });

  // ----- Request exception (dynamic form) -----
  document.getElementById('btn-request-exception').addEventListener('click', () => {
    openDynamicExceptionForm();
  });

  function openDynamicExceptionForm() {
    const host = document.createElement('div');
    host.className = 'modal-host';
    host.innerHTML = `
      <form class="modal" style="width: min(560px, 92vw);">
        <h3>⚠ בקשת אישור כניסה חריגה</h3>
        <p style="color: var(--text-mid); margin: 0 0 14px;">בחר סוג הישות והשדות יתעדכנו דינמית. הבקשה תישלח לקב"ט / חמ"ל.</p>

        <div style="background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 16px;" id="entity-picker">
          <button type="button" class="btn btn--sm btn--primary" data-entity="supplier">🚚 ספק</button>
          <button type="button" class="btn btn--sm" data-entity="guest">🎫 אורח</button>
          <button type="button" class="btn btn--sm" data-entity="staff">👥 איש צוות</button>
        </div>

        <div id="exc-fields"></div>

        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top: 16px;">
          <button type="button" class="btn btn--ghost" data-cancel>ביטול</button>
          <button type="submit" class="btn btn--primary">שלח לקב"ט</button>
        </div>
      </form>
    `;
    document.body.appendChild(host);
    const form = host.querySelector('form');
    let entityType = 'supplier';

    const FORMS = {
      supplier: [
        { name: 'company', label: 'שם החברה / ספק', required: true, placeholder: 'אקונומיה אלפא' },
        { name: 'driver',  label: 'שם הנהג', required: true },
        { name: 'phone',   label: 'טלפון', required: true, placeholder: '050-1234567' },
        { name: 'plate',   label: 'לוחית רישוי המשאית', required: true, placeholder: '12-345-67' },
        { name: 'destination', label: 'למי / לאיזו מחלקה הגיע האספקה', required: true, type: 'select', options: [
          { value: 'economy',    label: 'אקונומיה' },
          { value: 'sanitation', label: 'תברואה' },
          { value: 'logistics',  label: 'מנהלה / לוגיסטיקה' },
        ]},
      ],
      guest: [
        { name: 'name',    label: 'שם האורח', required: true, placeholder: 'מאיר כהן' },
        { name: 'phone',   label: 'טלפון', required: true, placeholder: '050-7654321' },
        { name: 'reason',  label: 'סיבת הגעה', required: true, placeholder: 'הורה בא לאסוף חניך' },
        { name: 'plate',   label: 'מספר רכב (אופציונלי)', required: false, placeholder: 'לא חובה' },
      ],
      staff: [
        { name: 'name',     label: 'שם איש הצוות', required: true, placeholder: 'יוסי לוי' },
        { name: 'tribe',    label: 'שבט המקור', required: true, placeholder: 'נחל' },
        { name: 'role',     label: 'תפקיד תנועתי במחנה', required: true, placeholder: 'מדריך מוסמך' },
        { name: 'phone',    label: 'טלפון', required: true },
        { name: 'plate',    label: 'מספר רכב (אופציונלי)', required: false },
      ],
    };

    function renderFields() {
      const fields = FORMS[entityType];
      document.getElementById('exc-fields').innerHTML = fields.map(f => {
        if (f.type === 'select') {
          return `<div class="form-field" style="margin-bottom: 10px;">
            <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px;">${f.label}${f.required ? ' *' : ''}</label>
            <select class="select" name="${f.name}" ${f.required ? 'required' : ''}>${f.options.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}</select>
          </div>`;
        }
        return `<div class="form-field" style="margin-bottom: 10px;">
          <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px;">${f.label}${f.required ? ' *' : ''}</label>
          <input class="input" type="${f.type || 'text'}" name="${f.name}" ${f.required ? 'required' : ''} ${f.placeholder ? `placeholder="${f.placeholder}"` : ''}>
        </div>`;
      }).join('');
    }
    renderFields();

    host.querySelectorAll('[data-entity]').forEach(b => b.addEventListener('click', () => {
      host.querySelectorAll('[data-entity]').forEach(x => { x.classList.remove('btn--primary'); });
      b.classList.add('btn--primary');
      entityType = b.dataset.entity;
      renderFields();
    }));

    host.querySelector('[data-cancel]').addEventListener('click', () => host.remove());
    host.addEventListener('click', e => { if (e.target === host) host.remove(); });

    form.addEventListener('submit', e => {
      e.preventDefault();
      const fields = FORMS[entityType];
      const data = {};
      for (const f of fields) {
        data[f.name] = (form.elements[f.name].value || '').trim();
      }
      // Build description from entity type
      const labels = { supplier: 'ספק', guest: 'אורח', staff: 'איש צוות' };
      let summary = '';
      let plate = data.plate || null;
      if (entityType === 'supplier') {
        const destLabel = (FORMS.supplier.find(x => x.name === 'destination').options.find(o => o.value === data.destination) || {}).label || data.destination;
        summary = `🚚 ${data.company} · נהג ${data.driver} · ל-${destLabel}`;
      } else if (entityType === 'guest') {
        summary = `🎫 ${data.name} · ${data.reason}`;
      } else {
        summary = `👥 ${data.name} · ${data.tribe} · ${data.role}`;
      }
      const id = util.uuid().slice(0, 8);
      const item = {
        id, plate, reason: summary, entityType, data,
        who: 'בקשת ש"ג ' + UI.currentPersona().name,
        ts: util.nowMs(), resolved: false,
      };
      ScoutDB.patch('gateExceptions', l => (l || []).concat([item]));
      Bus.emit('bus:gate-exception', item);
      ScoutDB.appendAudit({ action: 'GATE-EXCEPTION-REQ', channel: 'gate', details: `[${labels[entityType]}] ${summary}` });
      Toast.show('הבקשה נשלחה לקב"ט וחמ"ל.', { kind: 'warn' });
      host.remove();
      renderExceptions();
    });
  }

  // Cross-tab resolution from kabat/hq
  Bus.on('bus:gate-exception:resolved', payload => {
    const item = (ScoutDB.get('gateExceptions', []) || []).find(x => x.id === payload.id);
    if (item) {
      Toast.show(`בקשה לרכב ${item.plate || item.idNum} ${payload.decision === 'approved' ? 'אושרה' : 'נדחתה'}`, { kind: payload.decision === 'approved' ? 'ok' : 'danger' });
      Scout.Audio.play(payload.decision === 'approved' ? 'blip' : 'pulse-alert');
    }
    renderExceptions();
  });

  // Sync new items added by ourselves
  Bus.on('bus:gate-exception', () => renderExceptions());
  // Items added by Kabat in real-time
  Bus.on('bus:vehicle-added', () => { renderSuppliers(); Scout.Audio.play('blip'); Toast.show('ספק חדש התווסף ע"י הקב"ט.', { kind: 'ok' }); });
  Bus.on('bus:bus-added',     () => { renderBuses();     Scout.Audio.play('blip'); Toast.show('אוטובוס חדש בלוח ההיסעים.', { kind: 'ok' }); });
  Bus.on('bus:guest-issued',  () => { renderGuests();    renderStaff(); Scout.Audio.play('blip'); Toast.show('אורח חדש מאושר בתיאום קב"ט.', { kind: 'ok' }); });
  Bus.on('auth:user-invited', () => { renderStaff();     Scout.Audio.play('blip'); Toast.show('משתמש חדש הונפק ע"י הקב"ט (ממתין להפעלה).', { kind: 'ok' }); });
  Bus.on('auth:onboarded',    payload => { renderStaff(); Scout.Audio.play('echo-bell'); Toast.show(`✅ ${payload.username} הפעיל את חשבונו`, { kind: 'ok' }); });
  Bus.on('personnel:update',  () => { renderStaff(); renderGuests(); });

  UI.bindGlobalSOS({ lock: false });

  // ===== Patrol View (alternate UI for security in patrol mode) =====
  function renderPatrolView() {
    const waypoints = ScoutDB.get('patrolWaypoints', null) || [
      { id: 'wp1', name: 'סריקת שבט נחל',     visited: false },
      { id: 'wp2', name: 'גדר היקפית — צפון',  visited: false },
      { id: 'wp3', name: 'גדר היקפית — דרום',  visited: false },
      { id: 'wp4', name: 'שער ראשי',           visited: true },
      { id: 'wp5', name: 'מתחם אקונומיה',     visited: false },
      { id: 'wp6', name: 'מגדל תצפית',         visited: false },
    ];
    if (!ScoutDB.get('patrolWaypoints', null)) ScoutDB.set('patrolWaypoints', waypoints);
    const checklist = ScoutDB.get('patrolChecklist', null) || [
      { id: 'c1', label: 'בדיקת נעילת שערים',        done: false },
      { id: 'c2', label: 'תקינות תאורת היקף',         done: false },
      { id: 'c3', label: 'נוכחות שומרים בעמדה',       done: true },
      { id: 'c4', label: 'בדיקת מטפי כיבוי',           done: false },
      { id: 'c5', label: 'דיווח מפגעים בנקודות חשד', done: false },
    ];
    if (!ScoutDB.get('patrolChecklist', null)) ScoutDB.set('patrolChecklist', checklist);
    const visited = waypoints.filter(w => w.visited).length;
    const done = checklist.filter(c => c.done).length;
    return `
      <div style="padding: 14px;">
        <div style="background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 14px;">
          <div style="font-family: var(--font-ui); font-weight: 800; font-size: 18px; margin-bottom: 4px;">🚶 משמרת סיור פעילה</div>
          <div style="color: var(--text-mid); font-size: 13px;">${visited}/${waypoints.length} נקודות ציון · ${done}/${checklist.length} משימות סבב</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
          <div class="panel" style="padding: 14px;">
            <div style="font-family: var(--font-ui); font-weight: 700; margin-bottom: 10px;">📍 נקודות ציון לסבב</div>
            <div style="display: grid; gap: 6px;">
              ${waypoints.map(w => `
                <label style="display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: ${w.visited ? 'rgba(45,216,129,0.1)' : 'var(--bg-deep)'}; border: 1px solid ${w.visited ? 'var(--ok)' : 'var(--border)'}; border-radius: var(--r-sm); cursor: pointer;">
                  <input type="checkbox" data-wp="${w.id}" ${w.visited ? 'checked' : ''} style="accent-color: var(--ok); width: 18px; height: 18px;">
                  <span style="${w.visited ? 'color: var(--ok);' : ''}">${util.escapeHtml(w.name)}</span>
                </label>
              `).join('')}
            </div>
          </div>

          <div class="panel" style="padding: 14px;">
            <div style="font-family: var(--font-ui); font-weight: 700; margin-bottom: 10px;">📋 צ׳ק-ליסט סבב</div>
            <div style="display: grid; gap: 6px;">
              ${checklist.map(c => `
                <label style="display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: ${c.done ? 'rgba(77,208,225,0.1)' : 'var(--bg-deep)'}; border: 1px solid ${c.done ? 'var(--accent)' : 'var(--border)'}; border-radius: var(--r-sm); cursor: pointer;">
                  <input type="checkbox" data-task="${c.id}" ${c.done ? 'checked' : ''} style="accent-color: var(--accent); width: 18px; height: 18px;">
                  <span style="${c.done ? 'color: var(--accent); text-decoration: line-through;' : ''}">${util.escapeHtml(c.label)}</span>
                </label>
              `).join('')}
            </div>
          </div>
        </div>

        <div style="margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <button class="btn btn--lg" id="btn-report-hazard">📸 דיווח מפגע מהיר</button>
          <button class="btn btn--danger btn--lg" id="btn-patrol-sos">🚨 הפעלת SOS חירום</button>
        </div>
      </div>
    `;
  }

  function bindPatrolView() {
    document.querySelectorAll('[data-wp]').forEach(cb => cb.addEventListener('change', () => {
      ScoutDB.patch('patrolWaypoints', l => l.map(w => w.id === cb.dataset.wp ? Object.assign({}, w, { visited: cb.checked }) : w));
      ScoutDB.appendAudit({ action: 'PATROL-WP', channel: 'gate', details: `${cb.checked ? 'הגיע ל' : 'בוטל'} נקודת ציון ${cb.dataset.wp}` });
      document.querySelector('.gate-content').innerHTML = renderPatrolView();
      bindPatrolView();
    }));
    document.querySelectorAll('[data-task]').forEach(cb => cb.addEventListener('change', () => {
      ScoutDB.patch('patrolChecklist', l => l.map(t => t.id === cb.dataset.task ? Object.assign({}, t, { done: cb.checked }) : t));
      ScoutDB.appendAudit({ action: 'PATROL-TASK', channel: 'gate', details: cb.dataset.task });
      document.querySelector('.gate-content').innerHTML = renderPatrolView();
      bindPatrolView();
    }));
    const reportBtn = document.getElementById('btn-report-hazard');
    if (reportBtn) reportBtn.addEventListener('click', () => {
      const desc = prompt('תיאור המפגע (יישלח לחמ"ל עם המיקום הנוכחי):');
      if (!desc || !desc.trim()) return;
      ScoutDB.patch('hazards', l => (l || []).concat([{ id: util.uuid().slice(0,6), desc, ts: util.nowMs(), reportedBy: UI.currentPersona().name }]));
      Bus.emit('bus:hazard', { desc, ts: util.nowMs() });
      ScoutDB.appendAudit({ action: 'HAZARD-REPORT', channel: 'gate', details: desc });
      Scout.Audio.play('pulse-alert');
      Toast.show('המפגע דווח לחמ"ל.', { kind: 'warn' });
    });
    const sosBtn = document.getElementById('btn-patrol-sos');
    if (sosBtn) sosBtn.addEventListener('click', () => {
      if (!confirm('להפעיל אירוע SOS? פעולה זו תתריע לחמ"ל ולקב"ט.')) return;
      SOS.trigger({ source: 'patrol-manual', label: 'מאבטח בסיור — אירוע SOS', who: UI.currentPersona().name });
    });
  }

  // ===== Initial render — depends on mission =====
  if (currentMission === 'patrol') {
    document.querySelector('.gate-tabs').style.display = 'none';
    document.querySelector('.gate-content').innerHTML = renderPatrolView();
    bindPatrolView();
  } else {
    renderSuppliers();
    renderBuses();
    renderStaff();
    renderGuests();
    renderExceptions();
  }
})();
</script>
</body>
</html>
